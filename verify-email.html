<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify email · WorkoutSocial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { --ember:#F2542F; --bg:#0C0907; --card:#1A1310; --text:#fff; --muted:rgba(255,255,255,.6); --good:#46c26a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
           background-image:radial-gradient(circle at 50% 20%, rgba(242,84,47,.18), transparent 60%); }
    .wrap { width:100%; max-width:380px; text-align:center; }
    .flame { font-size:56px; line-height:1; }
    .brand { font-weight:900; font-size:20px; margin-top:6px; }
    h1 { font-size:26px; font-weight:900; margin-top:22px; }
    p.sub { color:var(--muted); font-size:15px; margin-top:10px; line-height:1.5; }
    .ok { color:var(--good); }
    .spinner { margin:26px auto 0; width:34px; height:34px; border-radius:50%;
               border:3px solid rgba(255,255,255,.15); border-top-color:var(--ember);
               animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hint { color:var(--muted); font-size:13px; margin-top:26px; line-height:1.6; }
    .hint b { color:var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="flame">🔥</div>
    <div class="brand">WorkoutSocial</div>
    <h1 id="title">Verifying your email…</h1>
    <p class="sub" id="msg">One sec — confirming it's really you.</p>
    <div class="spinner" id="spin"></div>
    <p class="hint" id="hint" style="display:none"></p>
  </div>

  <script>
    // Verify right here on the web — no app, no specific browser needed.
    // (The old page only deep-linked into the iOS app and told everyone else
    // to "open in Safari", which stranded Android users.)
    var API = 'https://api.workoutsocial.app';
    var token = new URLSearchParams(window.location.search).get('token');
    var title = document.getElementById('title'), msg = document.getElementById('msg');
    var spin = document.getElementById('spin'), hint = document.getElementById('hint');

    function done(ok, heading, body, hintHtml) {
      spin.style.display = 'none';
      title.textContent = heading;
      if (ok) { title.className = 'ok'; }
      msg.textContent = body;
      if (hintHtml) { hint.innerHTML = hintHtml; hint.style.display = 'block'; }
    }

    if (!token) {
      done(false, 'Missing link', 'This page needs the link from your verification email — try tapping it again.');
    } else {
      fetch(API + '/api/auth/verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token }),
      })
      .then(function (r) { if (!r.ok) { throw r; } })
      .then(function () {
        done(true, '✓ Email verified', "You're all set — your fire's official.",
          'Head back to the <b>WorkoutSocial app</b> and keep it alive. 🔥');
      })
      .catch(function () {
        done(false, "Couldn't verify", 'The link may have expired (they last 24 hours).',
          'Open the app and tap <b>resend verification email</b> to get a fresh link.');
      });
    }
  </script>
</body>
</html>
